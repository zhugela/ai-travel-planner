spring:
  application:
    name: yu-image-search-mcp-server
  profiles:
    # 默认走 stdio（本地子进程模式）；启动远程服务时改成 --spring.profiles.active=sse
    active: stdio
  ai:
    mcp:
      server:
        name: yu-image-search-mcp-server
        version: 0.0.1

server:
  port: 8127

# ====== 第三方 API 密钥（占位符，请到 https://www.pexels.com/api/ 申请后替换）======
pexels:
  api-key: ${PEXELS_API_KEY:REPLACE_WITH_YOUR_PEXELS_API_KEY}
