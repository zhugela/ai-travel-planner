# ============================================================
# AI 旅游规划助手 ai-travel-planner - 基础配置
# Spring AI 1.0.0 正式版 + DashScope 通义千问
# ============================================================

# 服务端口与统一接口前缀
server:
  port: 8123
  servlet:
    context-path: /api

# 应用服务名（统一改为 ai-travel-planner）
spring:
  application:
    name: ai-travel-planner

  # Spring AI 通义千问 DashScope 配置
  ai:
    dashscope:
      # 密钥从IDE/系统环境变量读取，禁止明文写死
      api-key: ${DASHSCOPE_API_KEY}
      # 对话大模型
      chat:
        options:
          model: qwen-plus
      # RAG向量化Embedding模型
      embedding:
        options:
          model: text-embedding-v3
    # MCP 客户端配置
    mcp:
      client:
        # SSE 远程模式：连接已启动的 image-search MCP 服务
        sse:
          connections:
            image-search:
              url: http://localhost:8127
        # Stdio 本地模式（启动子进程，注释掉用 SSE 更方便调试）
        # stdio:
        #   servers-configuration: classpath:mcp-servers.json

# Knife4j 在线接口文档
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# 搜索 API 配置（SerpAPI）
search-api:
  api-key: ${SEARCH_API_KEY:}

# 日志打印配置
logging:
  level:
    com.yupi.aitravelplanner: debug
    org.springframework.ai: debug