# ============================================================
# AI 旅游规划助手 ai-travel-planner - 基础配置
# Spring AI 1.0.0 正式版 + DashScope 通义千问
# ============================================================

# 服务端口与统一接口前缀
server:
  port: 8123
  servlet:
    context-path: /api

spring:
  ai:
    # ========== 新增下面三行，关闭Ollama自动装配 ==========
    ollama:
      chat:
        enabled: false
    # ==================================================
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3
    # MCP 客户端已禁用:本地 8127 端口的 image-search MCP 服务当前未启动,
    # 会导致 SseHttpClientTransport 创建时连不上 loopback 而启动失败
    mcp:
      client:
        enabled: false
#    mcp:
#      client:
#        sse:
#          connections:
#            image-search:
#              url: http://localhost:8127

# Knife4j 在线接口文档
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# 搜索 API 配置（SerpAPI）
search-api:
  api-key: ${SEARCH_API_KEY:}

# 日志打印配置
logging:
  level:
    com.yupi.aitravelplanner: debug
    org.springframework.ai: debug